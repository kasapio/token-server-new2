<!DOCTYPE html>
<html lang="pl">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Token check</title>
	<script>
	(async function(){
		const params = new URLSearchParams(location.search);
		const token = params.get('token');

		if (!token) {
			document.body.innerHTML = '<h1>Brak dostępu</h1>';
			return;
		}

		try {
			const res = await fetch('https://token-server.superkrispz8.workers.dev/?token=' + encodeURIComponent(token));
			if (!res.ok) {
				document.body.innerHTML = '<h1>Niepoprawny token</h1>';
				return;
			}

			// Token OK — usuń token z URL i przekieruj do gen.html (z pozostałymi parametrami, jeśli są)
			params.delete('token');
			const qs = params.toString();
			const cleanUrl = window.location.pathname + (qs ? ('?' + qs) : '');
			window.history.replaceState({}, document.title, cleanUrl);

			const target = 'gen.html' + (qs ? ('?' + qs) : '');
			window.location.href = target;

		} catch (err) {
			document.body.innerHTML = '<h1>Błąd połączenia</h1>';
		}
	})();
	</script>
</head>
<body></body>
</html>
